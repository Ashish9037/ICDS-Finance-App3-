name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Java setup (Android SDK needs Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 4: Install Capacitor
      - name: Install Dependencies
        run: npm install

      # Step 5: Add Android Platform
      - name: Add Android Platform
        run: npx cap add android

      # Step 6: Sync web files to Android
      - name: Sync Capacitor
        run: npx cap sync android

      # Step 7: Android SDK setup
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Step 8: Grant Gradle permission
      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      # Step 9: Build APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # Step 10: Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICDS-Finance-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Step 11: Create GitHub Release (optional - only on tag)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: ICDS Finance App ${{ github.ref_name }}
